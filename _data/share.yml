#  Sharing options at the bottom of the post.
#  Icons from <https://fontawesome.com/>

platforms:

  - type: Weibo
    icon: "fab fa-weibo"
    link: "https://service.weibo.com/share/share.php?title=TITLE&url=URL"

  # QQ好友
  - type: QQ好友
    icon: "fa-brands fa-qq"
    link: "https://connect.qq.com/widget/shareqq/index.html?title=TITLE&url=URL"

  # 知乎
  - type: 知乎
    icon: "fa-brands fa-zhihu"
    link: "https://www.zhihu.com/pin/create?title=TITLE&url=URL"
    
